version: "3.8"

services:
  postgres_db:
    container_name: postgres_db
    hostname: postgres_db
    image: postgres:16.3-alpine3.20
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_db
    volumes:
      - D:/.pgdata:/var/lib/postgresql/data
    networks:
      - postgres_network

networks:
  postgres_network:
    driver: bridge